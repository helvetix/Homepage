services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro   # optional, for Docker widgets later
    environment:
      TZ: America/Denver                    # ← Change this to your timezone (e.g. America/New_York, Europe/London)
      HOMEPAGE_ALLOWED_HOSTS: "*"           # Temporary: allows access from any computer on your network
